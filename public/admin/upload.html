<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>媒体上传</title>
    <style>
      body {
        max-width: 720px;
        margin: 0 auto;
        padding: 40px 18px;
        color: #24211d;
        background: #fbfaf7;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.7;
      }

      label,
      input,
      button,
      textarea {
        display: block;
        width: 100%;
        font: inherit;
      }

      input,
      textarea {
        margin: 6px 0 18px;
        padding: 10px;
        border: 1px solid #d6cec3;
        border-radius: 6px;
        background: #fff;
      }

      button {
        width: auto;
        padding: 9px 16px;
        border: 0;
        border-radius: 6px;
        color: #fff;
        background: #0f6b61;
        cursor: pointer;
      }

      textarea {
        min-height: 120px;
      }
    </style>
  </head>
  <body>
    <h1>媒体上传</h1>
    <p>这里适合上传不想放进 Git 的图片或视频。上传成功后，把返回的链接粘到文章里。</p>
    <form id="upload-form">
      <label for="token">上传令牌</label>
      <input id="token" name="token" type="password" autocomplete="off" required />
      <label for="file">文件</label>
      <input id="file" name="file" type="file" accept="image/*,video/*" required />
      <button type="submit">上传</button>
    </form>
    <label for="result">结果</label>
    <textarea id="result" readonly></textarea>
    <script>
      const form = document.querySelector("#upload-form");
      const result = document.querySelector("#result");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        result.value = "Uploading...";

        const data = new FormData(form);
        const token = data.get("token");
        data.delete("token");

        const response = await fetch("/api/media", {
          method: "POST",
          headers: {
            Authorization: `Bearer ${token}`,
          },
          body: data,
        });
        const payload = await response.json();

        if (!response.ok) {
          result.value = JSON.stringify(payload, null, 2);
          return;
        }

        const url = payload.url;
        const file = data.get("file");
        const isVideo = file && file.type && file.type.startsWith("video/");
        result.value = isVideo
          ? `<video controls src="${url}"></video>`
          : `![media](${url})`;
      });
    </script>
  </body>
</html>
